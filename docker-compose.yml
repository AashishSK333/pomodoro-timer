services:
  backend:
    build: ./backend
    environment:
      DB_PATH: /data/sessions.db
    volumes:
      - sqlite_data:/data
    ports:
      - "8000:8000"   # exposed so Claude MCP can reach the API directly
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
